name: Monitoring Demo

on:
  push:
    branches: [ main ]

permissions:
  contents: read   # Restrict default permissions

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # Prevent hanging jobs

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4   # Use latest stable version
      with:
        persist-credentials: false   # Prevent token misuse

    - name: Set up safe shell
      run: |
        set -euo pipefail

    - name: Run Step
      run: echo "Pipeline running"

    - name: Dependency Audit (optional but recommended)
      run: |
        if [ -f package.json ]; then
          npm audit --audit-level=high || true
        fi

    - name: Fail Step (Simulated Failure)
      run: |
        echo "Simulating failure..."
        exit 1
